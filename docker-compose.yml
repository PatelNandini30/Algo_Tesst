services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: algotest-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-algotest}
      POSTGRES_USER: ${POSTGRES_USER:-algotest}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-algotest_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./reports/sql:/data:ro
    command: >
      postgres
      -c shared_buffers=2GB
      -c effective_cache_size=6GB
      -c work_mem=64MB
      -c maintenance_work_mem=512MB
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c max_worker_processes=4
      -c max_parallel_workers_per_gather=2
      -c max_parallel_workers=4
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-algotest}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - algotest-network

  # Redis for caching and queue
  redis:
    image: redis:7-alpine
    container_name: algotest-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - algotest-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: algotest-backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-algotest}:${POSTGRES_PASSWORD:-algotest_password}@postgres:5432/${POSTGRES_DB:-algotest}
      - REDIS_URL=redis://redis:6379/0
      - DATA_DIR=/data
      - USE_POSTGRESQL=true
      - ALLOW_CSV_FALLBACK=false
      - PYTHONUNBUFFERED=1
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-algotest}
      - POSTGRES_USER=${POSTGRES_USER:-algotest}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-algotest_password}
    volumes:
      - ./cleaned_csvs:/data/cleaned_csvs:ro
      - ./expiryData:/data/expiryData:ro
      - ./strikeData:/data/strikeData:ro
      - ./Filter:/data/Filter:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - algotest-network

  # Celery Worker for background tasks
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: algotest-worker
    command: celery -A worker.celery worker -l info -c 2
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-algotest}:${POSTGRES_PASSWORD:-algotest_password}@postgres:5432/${POSTGRES_DB:-algotest}
      - REDIS_URL=redis://redis:6379/0
      - DATA_DIR=/data
    volumes:
      - ./cleaned_csvs:/data/cleaned_csvs:ro
      - ./expiryData:/data/expiryData:ro
      - ./strikeData:/data/strikeData:ro
      - ./Filter:/data/Filter:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A worker.celery inspect ping --timeout 5"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - algotest-network

  # Frontend - served via nginx which proxies /api to backend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: algotest-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - algotest-network

volumes:
  pgdata:
  redis_data:

networks:
  algotest-network:
    driver: bridge