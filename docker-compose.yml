services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-bullseye
    container_name: algotest-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-algotest}
      POSTGRES_USER: ${POSTGRES_USER:-algotest}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-algotest_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./reports/sql:/data:ro
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=2GB
      -c effective_cache_size=6GB
      -c work_mem=16MB
      -c maintenance_work_mem=512MB
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c max_worker_processes=4
      -c max_parallel_workers_per_gather=2
      -c max_parallel_workers=4
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-algotest}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - algotest-network

  # Redis for caching and queue
  redis:
    image: redis:7-bullseye
    container_name: algotest-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - algotest-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: algotest-backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    command:
      - uvicorn
      - main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --loop
      - uvloop
      - --workers
      - "1"
    environment:
      - UVICORN_LOOP=uvloop
      - UVICORN_WORKERS=1
      - DATABASE_URL=postgresql://${POSTGRES_USER:-algotest}:${POSTGRES_PASSWORD:-algotest_password}@postgres:5432/${POSTGRES_DB:-algotest}
      - DB_STATEMENT_TIMEOUT=1800000
      - REDIS_URL=redis://redis:6379/0
      - DATA_DIR=/data
      - USE_POSTGRESQL=true
      - ALLOW_CSV_FALLBACK=false
      - PYTHONUNBUFFERED=1
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-algotest}
      - POSTGRES_USER=${POSTGRES_USER:-algotest}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-algotest_password}
    volumes:
      - ./cleaned_csvs:/data/cleaned_csvs:ro
      - ./expiryData:/data/expiryData:ro
      - ./strikeData:/data/strikeData:ro
      - ./Filter:/data/Filter:ro
      - parquet_cache:/tmp/parquet_cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - algotest-network

  # Celery Worker for backtests
  worker-backtests:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: algotest-worker-backtests
    command: celery -A worker.celery worker -Q backtests -c 4 -l info
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-algotest}:${POSTGRES_PASSWORD:-algotest_password}@postgres:5432/${POSTGRES_DB:-algotest}
      - REDIS_URL=redis://redis:6379/0
      - DATA_DIR=/data
    volumes:
      - ./cleaned_csvs:/data/cleaned_csvs:ro
      - ./expiryData:/data/expiryData:ro
      - ./strikeData:/data/strikeData:ro
      - ./Filter:/data/Filter:ro
      - parquet_cache:/tmp/parquet_cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A worker.celery inspect ping --timeout 5"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - algotest-network

  worker-uploads:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: algotest-worker-uploads
    command: celery -A worker.celery worker -Q uploads -c 2 -l info
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-algotest}:${POSTGRES_PASSWORD:-algotest_password}@postgres:5432/${POSTGRES_DB:-algotest}
      - REDIS_URL=redis://redis:6379/0
      - DATA_DIR=/data
    volumes:
      - ./cleaned_csvs:/data/cleaned_csvs:ro
      - ./expiryData:/data/expiryData:ro
      - ./strikeData:/data/strikeData:ro
      - ./Filter:/data/Filter:ro
      - parquet_cache:/tmp/parquet_cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A worker.celery inspect ping --timeout 5"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - algotest-network

  # Frontend - served via nginx which proxies /api to backend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: algotest-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - algotest-network

  prometheus:
    image: prom/prometheus:latest
    container_name: algotest-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - algotest-network

  grafana:
    image: grafana/grafana:latest
    container_name: algotest-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - algotest-network

volumes:
  pgdata:
  redis_data:
  parquet_cache:

networks:
  algotest-network:
    driver: bridge
