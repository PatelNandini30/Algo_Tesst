x-backend-env: &backend-env
  DATABASE_URL: "postgresql://${POSTGRES_USER:-algotest}:${POSTGRES_PASSWORD:-algotest_password}@postgres:5432/${POSTGRES_DB:-algotest}"
  REDIS_URL: "redis://redis:6379/0"
  DATA_DIR: /data
  PYTHONUNBUFFERED: "1"
  MALLOC_ARENA_MAX: "2"
  DB_POOL_SIZE: "20"
  DB_POOL_MAX_OVERFLOW: "10"
  DB_POOL_TIMEOUT: "30"
  DB_POOL_RECYCLE: "3600"
x-backend-volumes: &backend-volumes
  - ./cleaned_csvs:/data/cleaned_csvs:ro
  - ./expiryData:/data/expiryData:ro
  - ./strikeData:/data/strikeData:ro
  - ./Filter:/data/Filter:ro
  - parquet_cache:/tmp/parquet_cache
services:
  postgres:
    image: postgres:15-bullseye
    container_name: algotest-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-algotest}
      POSTGRES_USER: ${POSTGRES_USER:-algotest}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-algotest_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./reports/sql:/data:ro
    shm_size: '256mb'
    command: >
      postgres
      -c max_connections=100
      -c shared_buffers=256MB
      -c effective_cache_size=2GB
      -c work_mem=16MB
      -c maintenance_work_mem=128MB
      -c random_page_cost=1.1
      -c effective_io_concurrency=100
      -c max_worker_processes=4
      -c max_parallel_workers_per_gather=2
      -c max_parallel_workers=4
      -c checkpoint_completion_target=0.9
      -c wal_buffers=8MB
      -c default_statistics_target=100
      -c log_min_duration_statement=1000
      -c idle_in_transaction_session_timeout=600000
      -c statement_timeout=120000
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-algotest}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 3500M
          cpus: "2.0"
        reservations:
          memory: 1024M
    networks:
      - algotest-network
  redis:
    image: redis:7-bullseye
    container_name: algotest-redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 450mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
      --tcp-keepalive 60
      --timeout 300
    environment:
      REDIS_PASSWORD: ""
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 128M
    networks:
      - algotest-network
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: algotest-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    command:
      - uvicorn
      - main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --loop
      - uvloop
      - --workers
      - "2"
      - --timeout-keep-alive
      - "65"
      - --no-server-header
    environment:
      <<: *backend-env
      UVICORN_LOOP: uvloop
      UVICORN_WORKERS: "2"
      DB_STATEMENT_TIMEOUT: "1800000"
      USE_POSTGRESQL: "true"
      ALLOW_CSV_FALLBACK: "false"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-algotest}
      POSTGRES_USER: ${POSTGRES_USER:-algotest}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-algotest_password}
    volumes: *backend-volumes
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; r=urllib.request.urlopen('http://localhost:8000/health'); print(r.read())"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: "1.5"
        reservations:
          memory: 256M
    networks:
      - algotest-network
  worker-backtests:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: algotest-worker-backtests
    restart: unless-stopped
    command: >
      celery -A worker.celery worker
      -Q backtests
      -c 3
      -l info
      --max-memory-per-child=600000
      --without-gossip
      --without-mingle
      --without-heartbeat
    environment: *backend-env
    volumes: *backend-volumes
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A worker.celery inspect ping --timeout 5"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 3000M
          cpus: "4.0"
        reservations:
          memory: 512M
    networks:
      - algotest-network
  worker-uploads:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: algotest-worker-uploads
    restart: unless-stopped
    command: >
      celery -A worker.celery worker
      -Q uploads
      -c 2
      -l info
      --max-memory-per-child=400000
      --without-gossip
      --without-mingle
      --without-heartbeat
    environment: *backend-env
    volumes: *backend-volumes
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A worker.celery inspect ping --timeout 5"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1000M
          cpus: "1.0"
        reservations:
          memory: 256M
    networks:
      - algotest-network
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: algotest-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pkill -0 nginx || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 64M
    networks:
      - algotest-network
volumes:
  pgdata:
  redis_data:
  parquet_cache:
networks:
  algotest-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
