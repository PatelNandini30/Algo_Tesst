worker_processes auto;
worker_rlimit_nofile 65536;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    # Gzip compression — reduces JSON payloads by ~80%
    gzip on;
    gzip_vary on;
    gzip_comp_level 4;
    gzip_types application/json text/plain text/css application/javascript;

    # Rate limits for different workflows
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=api_backtest:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=api_upload:10m rate=2r/s;

    upstream backend_pool {
        server backend:8000;
        keepalive 32;
    }

    server {
        listen 3000;
        server_name _;
        client_max_body_size 50M;
        client_body_buffer_size 1M;
        root /usr/share/nginx/html;
        index index.html;

        location ~* \.(js|css|png|jpg|ico|woff2)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        location /api/backtest {
            limit_req zone=api_backtest burst=20 nodelay;
            proxy_pass http://backend_pool/api/backtest;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 300s;
            proxy_connect_timeout 5s;
            proxy_send_timeout 300s;
            proxy_buffering on;
            proxy_buffer_size 16k;
            proxy_buffers 8 16k;
        }

        location /api/upload {
            limit_req zone=api_upload burst=5 nodelay;
            proxy_pass http://backend_pool/api/upload;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 300s;
            proxy_connect_timeout 5s;
            proxy_send_timeout 300s;
            proxy_buffering on;
            proxy_buffer_size 16k;
            proxy_buffers 8 16k;
        }

        location /api/ {
            limit_req zone=api_general burst=50 nodelay;
            proxy_pass http://backend_pool/api/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 600s;
            proxy_connect_timeout 30s;
            proxy_send_timeout 600s;
            proxy_buffering on;
            proxy_buffer_size 16k;
            proxy_buffers 8 16k;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
